name: Download and Zip Manga Chapter

on:
  workflow_dispatch:
    inputs:
      chapter_url:
        description: 'Full URL of the manga chapter page'
        required: true
        type: string
      manga_title:
        description: 'Manga title (no spaces, e.g., OnePiece)'
        required: true
        type: string
      chapter_name:
        description: 'Chapter identifier (e.g., ch_001)'
        required: true
        type: string

jobs:
  download-and-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pillow~=9.0.1

      - name: Run manga downloader script
        run: |
          python download_chapter.py \
            --url "${{ github.event.inputs.chapter_url }}" \
            --title "${{ github.event.inputs.manga_title }}" \
            --chapter "${{ github.event.inputs.chapter_name }}"

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.manga_title }}-${{ github.event.inputs.chapter_name }}
          path: ${{ github.event.inputs.manga_title }}_${{ github.event.inputs.chapter_name }}.zip

      # Optional: commit and push the ZIP to the repository
      - name: Commit and push ZIP to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ github.event.inputs.manga_title }}_${{ github.event.inputs.chapter_name }}.zip
          git commit -m "Add manga chapter ${{ github.event.inputs.chapter_name }} [skip ci]" || echo "No changes"
          git push
