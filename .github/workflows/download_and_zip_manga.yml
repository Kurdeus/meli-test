name: Download and Zip Manga Chapter

on:
  workflow_dispatch:
    inputs:
      chapter_url:
        description: 'https://manhwaclan.com/manga/webtoon-character-na-kang-lim/chapter-1/'
        required: true
        type: string
      manga_title:
        description: 'Webtoon Character Na Kang Lim'
        required: true
        type: string
      chapter_name:
        description: 'ch_001'
        required: true
        type: string

jobs:
  download-and-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run manga downloader script
        run: |
          python download_chapter.py \
            --url "${{ github.event.inputs.chapter_url }}" \
            --title "${{ github.event.inputs.manga_title }}" \
            --chapter "${{ github.event.inputs.chapter_name }}"

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.manga_title }}-${{ github.event.inputs.chapter_name }}
          path: ${{ github.event.inputs.manga_title }}_${{ github.event.inputs.chapter_name }}.zip

      # --- OPTIONAL: commit and push to repository (like APK example) ---
