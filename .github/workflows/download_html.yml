name: Download HTML (no Python, no ZIP)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL of the webpage to download'
        required: true
        type: string
      output_filename:
        description: 'Output filename (e.g., my_page.html)'
        required: true
        type: string
        default: 'downloaded.html'

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download HTML with curl
        run: |
          curl -L -o "${{ github.event.inputs.output_filename }}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "${{ github.event.inputs.target_url }}"

      - name: Commit and push HTML file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.output_filename }}"
          git commit -m "Download HTML from ${{ github.event.inputs.target_url }} [skip ci]" || echo "No changes to commit"
          git push
