name: Download OMEGA Batch Chapter

on:
  workflow_dispatch:
    inputs:
      manga_title:
        description: 'Manga title (e.g., pickup)'
        required: true
        type: string
      start_chapter:
        description: 'First chapter number'
        required: true
        default: 1
        type: number
      end_chapter:
        description: 'Last chapter number'
        required: true
        default: 15
        type: number

jobs:
  download-and-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pillow~=9.0.1

      - name: Run manga downloader script
        run: |
          python omegabatch.py \
            --title "${{ github.event.inputs.manga_title }}" \
            --start ${{ github.event.inputs.start_chapter }} \
            --end ${{ github.event.inputs.end_chapter }}

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.manga_title }}_${{ github.event.inputs.start_chapter }}-${{ github.event.inputs.end_chapter }}
          path: ${{ github.event.inputs.manga_title }}_${{ github.event.inputs.start_chapter }}-${{ github.event.inputs.end_chapter }}.zip

      - name: Commit and push ZIP to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ github.event.inputs.manga_title }}_${{ github.event.inputs.start_chapter }}-${{ github.event.inputs.end_chapter }}.zip
          git commit -m "Add manga ${{ github.event.inputs.manga_title }} (chapters ${{ github.event.inputs.start_chapter }}-${{ github.event.inputs.end_chapter }}) [skip ci]" || echo "No changes to commit"
          git push
