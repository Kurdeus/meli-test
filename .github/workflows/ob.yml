name: Download OMEGA Batch Chapter

on:
  workflow_dispatch:
    inputs:
      manga_title:
        description: 'Manga title (no spaces, e.g., OnePiece)'
        required: true
        type: string
   

jobs:
  download-and-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run manga downloader script
        run: |
          python omegabatch.py

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.manga_title }}
          path: ${{ github.event.inputs.manga_title }}.zip

      # Optional: commit and push the ZIP to the repository
      - name: Commit and push ZIP to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ github.event.inputs.manga_title }}.zip
          git commit -m "Add manga chapter [skip ci]" || echo "No changes"
          git push
